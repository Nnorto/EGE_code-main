<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Решение на доске</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #e5e7eb;
        }

        .btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #3b82f6, #22c55e);
            border-radius: 999px;
            text-decoration: none;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.55);
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(37, 99, 235, 0.7);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.5);
        }
    </style>
</head>
<body>
    <a class="btn" href="https://app.idroo.com/ru/boards/9MdKyznztn" target="_blank" rel="noopener noreferrer">
        Решение на доске
    </a>
</body>
</html>
